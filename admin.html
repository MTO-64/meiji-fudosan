<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>管理画面 | 株式会社明治不動産</title>
<style>
  :root {
    --gold: #b8960c;
    --gold-light: #d4af37;
    --dark: #1a1a1a;
    --white: #ffffff;
    --off-white: #f8f6f2;
    --text: #333333;
    --muted: #777777;
    --border: #e0d8c8;
    --danger: #c0392b;
    --success: #2a7a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: #f0ece4; color: var(--text); min-height: 100vh; }

  /* ===== ADMIN SHELL ===== */
  .admin-header {
    background: var(--dark); color: white; padding: 0 24px;
    height: 60px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .admin-header-left { display: flex; align-items: center; gap: 16px; }
  .admin-header h1 { font-size: 14px; letter-spacing: 2px; color: var(--gold-light); font-weight: 600; }
  .admin-header-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
  .admin-header-right { display: flex; align-items: center; gap: 12px; }
  .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);
    padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

  .admin-content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* ===== SECTION CARD ===== */
  .admin-card {
    background: white; border-radius: 12px; padding: 28px 32px; margin-bottom: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .admin-card-title {
    font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 20px;
    padding-bottom: 14px; border-bottom: 2px solid var(--border); display: flex;
    align-items: center; gap: 8px;
  }

  /* ===== BUTTONS ===== */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
    border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    transition: all 0.2s; text-decoration: none; }
  .btn-primary { background: var(--dark); color: white; }
  .btn-primary:hover { background: #333; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-danger { background: #fff0f0; color: var(--danger); border: 1px solid #f5c6c6; }
  .btn-danger:hover { background: #fde8e8; }
  .btn-success { background: #e6f4e6; color: var(--success); border: 1px solid #b6d9b6; }
  .btn-success:hover { background: #d0ebd0; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ===== PROPERTY LIST ===== */
  .prop-list { display: flex; flex-direction: column; gap: 16px; }
  .prop-item {
    border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .prop-item.inactive { opacity: 0.55; }
  .prop-item-header {
    background: var(--off-white); padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    cursor: pointer; user-select: none;
  }
  .prop-item-header:hover { background: #f0ece4; }
  .prop-item-title { font-size: 14px; font-weight: 700; color: var(--dark); }
  .prop-item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .prop-item-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .prop-toggle-arrow { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .prop-item.open .prop-toggle-arrow { transform: rotate(180deg); }
  .prop-item-body { display: none; padding: 20px 18px; border-top: 1px solid var(--border); }
  .prop-item.open .prop-item-body { display: block; }

  /* ===== FORM FIELDS ===== */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s;
    background: white; color: var(--text);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
  .form-group textarea { resize: vertical; min-height: 72px; }
  .form-section-label {
    font-size: 12px; font-weight: 700; color: var(--dark); letter-spacing: 1px;
    margin: 20px 0 10px; padding: 0 0 6px; border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .specs-list { display: flex; flex-direction: column; gap: 6px; }
  .spec-row { display: flex; gap: 8px; align-items: center; }
  .spec-row input { flex: 1; }
  .btn-icon { background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
  .photos-list { display: flex; flex-direction: column; gap: 8px; }
  .photo-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 8px; align-items: center; }
  .photo-row input { font-size: 12px; }
  .form-actions { display: flex; align-items: center; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .save-feedback { font-size: 12px; color: var(--success); font-weight: 600; display: none; }

  /* ===== STATUS TOGGLE ===== */
  .status-toggle { display: flex; align-items: center; gap: 8px; }
  .toggle-switch {
    position: relative; display: inline-block; width: 42px; height: 24px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc; border-radius: 24px; transition: 0.3s;
  }
  .toggle-slider:before {
    position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
    background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .toggle-slider { background: var(--success); }
  input:checked + .toggle-slider:before { transform: translateX(18px); }
  .toggle-label { font-size: 12px; color: var(--muted); }

  /* ===== DEPLOY GUIDE ===== */
  .deploy-steps { display: flex; flex-direction: column; gap: 12px; }
  .deploy-step {
    display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px;
    background: var(--off-white); border-radius: 8px; border-left: 3px solid var(--gold);
  }
  .deploy-step-num {
    background: var(--gold); color: white; font-size: 12px; font-weight: 700;
    width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin-top: 1px;
  }
  .deploy-step-text { font-size: 13px; line-height: 1.7; }
  .deploy-step-text strong { color: var(--dark); }
  .download-area { text-align: center; padding: 24px; background: var(--off-white); border-radius: 10px; border: 2px dashed var(--border); }
  .download-area p { font-size: 13px; color: var(--muted); margin-top: 12px; line-height: 1.7; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 32px; right: 32px; background: var(--dark); color: white;
    padding: 13px 22px; border-radius: 8px; font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25); opacity: 0; transform: translateY(10px);
    transition: all 0.3s; pointer-events: none; z-index: 9999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 700px) {
    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    .admin-content { padding: 20px 14px; }
    .admin-card { padding: 20px 16px; }
    .photo-row { grid-template-columns: 1fr auto; }
    .photo-row input:nth-child(2) { display: none; }
  }
</style>

      photos:[{url:'',cap:''},{url:'',cap:''},{url:'',cap:''}],
    },
  };
  saveProps();
}

function saveProps() {
  localStorage.setItem('meiji_props', JSON.stringify(props));
}

/* ===== RENDER PROP LIST ===== */
function initAdmin() {
  loadProps();
  renderPropList();
}

function renderPropList() {
  const list = document.getElementById('propList');
  list.innerHTML = '';
  Object.values(props).forEach(p => {
    const div = document.createElement('div');
    div.className = 'prop-item' + (p.active === false ? ' inactive' : '');
    div.id = 'propItem_' + p.id;
    div.innerHTML = buildPropItemHTML(p);
    list.appendChild(div);
  });
}

function buildPropItemHTML(p) {
  const specsHtml = (p.specs || []).map((s,i) => `
    <div class="spec-row">
      <input type="text" value="${escHtml(s)}" data-field="specs" data-idx="${i}" onchange="updateField('${p.id}','specs',this)">
      <button class="btn-icon" onclick="removeSpec('${p.id}',${i})" title="削除">×</button>
    </div>`).join('');

  const photosHtml = (p.photos || []).map((ph,i) => `
    <div class="photo-row">
      <input type="text" placeholder="画像URL（例: https://...）" value="${escHtml(ph.url||'')}" data-field="photos" data-sub="url" data-idx="${i}" onchange="updatePhoto('${p.id}',${i},'url',this.value)">
      <input type="text" placeholder="キャプション" value="${escHtml(ph.cap||'')}" data-field="photos" data-sub="cap" data-idx="${i}" onchange="updatePhoto('${p.id}',${i},'cap',this.value)">
      <button class="btn-icon" onclick="removePhoto('${p.id}',${i})" title="削除">×</button>
    </div>`).join('');

  const facilitiesHtml = (p.facilities || []).map((f,i) => `
    <div class="spec-row">
      <input type="text" placeholder="アイコン" value="${escHtml(f.icon||'')}" style="width:60px;flex:none" onchange="updateFacility('${p.id}',${i},'icon',this.value)">
      <input type="text" placeholder="施設名" value="${escHtml(f.name||'')}" onchange="updateFacility('${p.id}',${i},'name',this.value)">
      <input type="text" placeholder="距離" value="${escHtml(f.dist||'')}" style="width:160px;flex:none" onchange="updateFacility('${p.id}',${i},'dist',this.value)">
      <button class="btn-icon" onclick="removeFacility('${p.id}',${i})" title="削除">×</button>
    </div>`).join('');

  return `
  <div class="prop-item-header" onclick="togglePropItem('${p.id}')">
    <div>
      <div class="prop-item-title">${escHtml(p.cardEmoji||'')} ${escHtml(p.name||'（名称未設定）')}</div>
      <div class="prop-item-meta">${escHtml(p.price||'')} ${escHtml(p.unit||'')} ／ ${escHtml(p.loc||'')}</div>
    </div>
    <div class="prop-item-actions">
      <div class="status-toggle">
        <label class="toggle-switch">
          <input type="checkbox" ${p.active !== false ? 'checked' : ''} onchange="toggleActive('${p.id}',this.checked)" onclick="event.stopPropagation()">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">${p.active !== false ? '公開中' : '非公開'}</span>
      </div>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteProp('${p.id}')">削除</button>
      <span class="prop-toggle-arrow">▼</span>
    </div>
  </div>
  <div class="prop-item-body">
    <div class="form-grid">
      <div class="form-group">
        <label>物件名</label>
        <input type="text" value="${escHtml(p.name||'')}" onchange="setField('${p.id}','name',this.value)">
      </div>
      <div class="form-group">
        <label>種別</label>
        <select onchange="setField('${p.id}','cardType',this.value)">
          <option value="buy" ${p.cardType==='buy'?'selected':''}>売買</option>
          <option value="rent" ${p.cardType==='rent'?'selected':''}>賃貸</option>
          <option value="other" ${p.cardType==='other'?'selected':''}>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>価格</label>
        <input type="text" value="${escHtml(p.price||'')}" onchange="setField('${p.id}','price',this.value)">
      </div>
      <div class="form-group">
        <label>単位（万円 など）</label>
        <input type="text" value="${escHtml(p.unit||'万円')}" onchange="setField('${p.id}','unit',this.value)">
      </div>
      <div class="form-group">
        <label>所在地（短縮）</label>
        <input type="text" value="${escHtml(p.loc||'')}" onchange="setField('${p.id}','loc',this.value)">
      </div>
      <div class="form-group">
        <label>所在地（正式）</label>
        <input type="text" value="${escHtml(p.fullLoc||'')}" onchange="setField('${p.id}','fullLoc',this.value)">
      </div>
      <div class="form-group">
        <label>絵文字アイコン</label>
        <input type="text" value="${escHtml(p.cardEmoji||'')}" onchange="setField('${p.id}','cardEmoji',this.value)">
      </div>
      <div class="form-group">
        <label>カード背景色</label>
        <input type="text" value="${escHtml(p.cardBg||'#e0e0e0')}" onchange="setField('${p.id}','cardBg',this.value)">
      </div>
      <div class="form-group">
        <label>バッジ表示名</label>
        <input type="text" value="${escHtml(p.cardBadge||'')}" onchange="setField('${p.id}','cardBadge',this.value)">
      </div>
      <div class="form-group">
        <label>アットホームURL</label>
        <input type="text" value="${escHtml(p.athomeUrl||'')}" onchange="setField('${p.id}','athomeUrl',this.value)">
      </div>
      <div class="form-group">
        <label>GoogleマップURL</label>
        <input type="text" value="${escHtml(p.mapUrl||'')}" onchange="setField('${p.id}','mapUrl',this.value)">
      </div>
    </div>

    <div class="form-section-label">アクセス情報</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>電車</label>
        <input type="text" value="${escHtml((p.access||{}).train||'')}" onchange="setAccessField('${p.id}','train',this.value)">
      </div>
      <div class="form-group full">
        <label>バス</label>
        <input type="text" value="${escHtml((p.access||{}).bus||'')}" onchange="setAccessField('${p.id}','bus',this.value)">
      </div>
      <div class="form-group full">
        <label>車</label>
        <input type="text" value="${escHtml((p.access||{}).car||'')}" onchange="setAccessField('${p.id}','car',this.value)">
      </div>
    </div>

    <div class="form-section-label">概要・環境</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>物件概要</label>
        <textarea onchange="setField('${p.id}','overview',this.value)">${escHtml(p.overview||'')}</textarea>
      </div>
      <div class="form-group full">
        <label>周辺環境</label>
        <textarea onchange="setField('${p.id}','environment',this.value)">${escHtml(p.environment||'')}</textarea>
      </div>
    </div>

    <div class="form-section-label">スペックタグ <button class="btn btn-sm btn-success" style="margin-left:8px" onclick="addSpec('${p.id}')">＋ 追加</button></div>
    <div class="specs-list" id="specsList_${p.id}">${specsHtml}</div>

    <div class="form-section-label">周辺施設 <button class="btn btn-sm btn-success" style="margin-left:8px" onclick="addFacility('${p.id}')">＋ 追加</button></div>
    <div class="specs-list" id="facilitiesList_${p.id}">${facilitiesHtml}</div>

    <div class="form-section-label">写真（URLを入力すると表示されます） <button class="btn btn-sm btn-success" style="margin-left:8px" onclick="addPhoto('${p.id}')">＋ 追加</button></div>
    <div class="photos-list" id="photosList_${p.id}">${photosHtml}</div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="savePropItem('${p.id}')">💾 保存</button>
      <span class="save-feedback" id="saveFeedback_${p.id}">✓ 保存しました</span>
    </div>
  </div>`;
}

function togglePropItem(id) {
  const el = document.getElementById('propItem_' + id);
  el.classList.toggle('open');
}

/* ===== FIELD UPDATES ===== */
function setField(id, field, val) { props[id][field] = val; }
function setAccessField(id, key, val) { if (!props[id].access) props[id].access = {}; props[id].access[key] = val; }

function updatePhoto(id, idx, key, val) {
  if (!props[id].photos) props[id].photos = [];
  if (!props[id].photos[idx]) props[id].photos[idx] = {url:'',cap:''};
  props[id].photos[idx][key] = val;
}
function addPhoto(id) {
  if (!props[id].photos) props[id].photos = [];
  props[id].photos.push({url:'',cap:''});
  refreshPropItem(id);
}
function removePhoto(id, idx) {
  props[id].photos.splice(idx, 1);
  refreshPropItem(id);
}

function addSpec(id) {
  if (!props[id].specs) props[id].specs = [];
  props[id].specs.push('');
  refreshPropItem(id);
}
function removeSpec(id, idx) {
  props[id].specs.splice(idx, 1);
  refreshPropItem(id);
}
function updateField(id, field, el) {
  const idx = parseInt(el.dataset.idx);
  if (field === 'specs') props[id].specs[idx] = el.value;
}

function updateFacility(id, idx, key, val) {
  if (!props[id].facilities) props[id].facilities = [];
  if (!props[id].facilities[idx]) props[id].facilities[idx] = {icon:'',name:'',dist:''};
  props[id].facilities[idx][key] = val;
}
function addFacility(id) {
  if (!props[id].facilities) props[id].facilities = [];
  props[id].facilities.push({icon:'',name:'',dist:''});
  refreshPropItem(id);
}
function removeFacility(id, idx) {
  props[id].facilities.splice(idx, 1);
  refreshPropItem(id);
}

function toggleActive(id, checked) {
  props[id].active = checked;
  const item = document.getElementById('propItem_' + id);
  if (checked) item.classList.remove('inactive'); else item.classList.add('inactive');
  saveProps();
}

function refreshPropItem(id) {
  const el = document.getElementById('propItem_' + id);
  const wasOpen = el.classList.contains('open');
  el.innerHTML = buildPropItemHTML(props[id]);
  if (wasOpen) el.classList.add('open');
}

function savePropItem(id) {
  saveProps();
  const fb = document.getElementById('saveFeedback_' + id);
  fb.style.display = 'inline';
  setTimeout(() => fb.style.display = 'none', 2500);
  const header = document.querySelector('#propItem_' + id + ' .prop-item-title');
  if (header) header.textContent = (props[id].cardEmoji||'') + ' ' + (props[id].name||'（名称未設定）');
  showToast('「' + (props[id].name||'物件') + '」を保存しました');
}

/* ===== ADD / DELETE PROPERTY ===== */
function addProperty() {
  const id = 'p' + Date.now();
  props[id] = {
    id, active: true, cardType: 'buy', cardBadge: '売買', cardEmoji: '🏠', cardBg: '#e0e0e0',
    name: '（新規物件）', price: '', unit: '万円', loc: '', fullLoc: '',
    athomeUrl: 'https://www.athome.co.jp/ahch/meijihudousan.html',
    specs: [], access: { train: '', bus: '', car: '' },
    mapUrl: '', overview: '', environment: '', facilities: [], photos: [],
  };
  saveProps();
  renderPropList();
  const newItem = document.getElementById('propItem_' + id);
  if (newItem) { newItem.classList.add('open'); newItem.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  showToast('新規物件を追加しました');
}

function deleteProp(id) {
  const name = (props[id] && props[id].name) || '物件';
  if (!confirm(`「${name}」を削除しますか？\nこの操作は元に戻せません。`)) return;
  delete props[id];
  saveProps();
  renderPropList();
  showToast('「' + name + '」を削除しました');
}

/* ===== PUBLISH (auto via Supabase Edge Function) ===== */
const PUBLISH_ENDPOINT = 'https://xmeqgdbxbgaopolzjost.supabase.co/functions/v1/meiji-publish';

function buildPropertiesDataJs() {
  const date = new Date().toISOString().slice(0,10);
  const json = JSON.stringify(props, null, 2)
    .replace(/"([^"]+)":/g, (m, k) => `${k}:`)
    .replace(/"/g, "'");
  return `/* 明治不動産 物件データ | 最終更新: ${date} */\nwindow.propConfig = ${json};\n`;
}

async function publishToGitHub() {
  const btn = document.getElementById('publishBtn');
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ 送信中...';
  try {
    const content = buildPropertiesDataJs();
    const res = await fetch(PUBLISH_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content,
        filename: 'properties-data.js',
      }),
    });
    let payload = null;
    try { payload = await res.json(); } catch (_) { /* ignore */ }
    if (res.ok && payload && payload.success) {
      btn.textContent = '✓ 反映完了';
      showToast('✓ ' + (payload.message || 'GitHubに反映しました。1〜2分でサイトに表示されます。'));
      setTimeout(() => { btn.disabled = false; btn.textContent = originalLabel; }, 4000);
      return;
    }
    const msg = (payload && payload.error) ? payload.error : `送信失敗 (status ${res.status})`;
    showToast('エラー: ' + msg);
  } catch (e) {
    showToast('通信エラー: ' + (e && e.message ? e.message : e));
  }
  btn.disabled = false;
  btn.textContent = originalLabel;
}

/* ===== TOAST ===== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ===== UTIL ===== */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
