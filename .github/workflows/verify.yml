name: verify
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: properties-data.js 構文チェック
        run: node --check properties-data.js

      - name: properties-data.js スキーマ検証
        run: node scripts/validate-properties.mjs

      - name: index.html / admin.html 構文チェック (Node tokenizer 経由ではなく単純 grep でタグ閉じだけ)
        run: |
          # GitHub Pages 配信前の最低限のサニティ。詳細な lint は別ジョブに切り出す前提。
          for f in index.html admin.html; do
            if [[ ! -f "$f" ]]; then
              echo "ERROR: $f が見つかりません" >&2
              exit 1
            fi
            # <script> ブロック数が偶数(=開閉対応)かだけ確認
            opens=$(grep -c '<script' "$f" || true)
            closes=$(grep -c '</script>' "$f" || true)
            if [[ "$opens" -ne "$closes" ]]; then
              echo "ERROR: $f の <script> 開閉数が不一致 (open=$opens, close=$closes)" >&2
              exit 1
            fi
            echo "  ✓ $f: <script> open/close = $opens"
          done

  deploy-edge:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # github.event.before との diff のためフル履歴を取得
          fetch-depth: 0

      - name: edge-functions/ の変更を検出
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          # 新規ブランチ初回 push (BEFORE=zero sha) や shallow clone で BEFORE が
          # ローカルに無い場合は、安全側に倒して deploy を実行する。
          ZERO=0000000000000000000000000000000000000000
          if [[ -z "$BEFORE" || "$BEFORE" == "$ZERO" ]] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "before SHA 不在 / 検証不能 → 安全側で deploy 実行"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" HEAD | grep -E '^edge-functions/' >/dev/null; then
            echo "edge-functions に変更あり → deploy 実行"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "edge-functions に変更なし → skip"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Edge Function 自動 deploy
        if: steps.detect.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" || -z "${SUPABASE_PROJECT_REF}" ]]; then
            echo "ERROR: GitHub Actions secrets SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF が未設定" >&2
            exit 1
          fi
          bash deploy-edge.sh
